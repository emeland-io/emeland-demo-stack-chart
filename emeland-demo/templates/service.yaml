{{- if .Values.filter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "emeland-demo.fullname" . }}-filter
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
    component: filter
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.filter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "emeland-demo.selectorLabels" . | nindent 4 }}
    component: filter

---

{{- end }}
{{- if .Values.server.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "emeland-demo.fullname" . }}-server
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
    component: server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "emeland-demo.selectorLabels" . | nindent 4 }}
    component: server

---

{{- end }}
{{- if .Values.gitserver.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "emeland-demo.fullname" . }}-git
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
    component: gitserver
spec:
  type: ClusterIP
  ports:
    - port: 22
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    {{- include "emeland-demo.selectorLabels" . | nindent 4 }}
    component: gitserver
{{- end }}
