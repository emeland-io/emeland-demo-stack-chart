{{- if .Values.gitsensor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "emeland-demo.fullname" . }}-gitsensor-config
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
data:
  sensor.yaml: |
    subscribers:
{{- if .Values.gitsensor.subscribers }}
{{- range .Values.gitsensor.subscribers }}
      - {{ tpl . $ | quote }}
{{- end }}
{{- else if .Values.filter.enabled }}
      - {{ include "emeland-demo.filterApiUrl" . | quote }}
{{- else }}
      - {{ include "emeland-demo.modelsrvApiUrl" . | quote }}
{{- end }}
    watch: true
    repos:
      - type: github
        deployKey: /keys/id_ed25519.pub
        repo: {{ include "emeland-demo.gitRepoSSH" . }}
        branch: {{ .Values.gitsensor.branch }}
        checkoutDir: {{ .Values.gitsensor.checkoutDir }}
        paths:
{{- range .Values.gitsensor.watchedPaths }}
          - {{ . | quote }}
{{- end }}
{{- end }}
