apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emeland-demo.fullname" . }}-gitserver
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
    component: gitserver
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "emeland-demo.selectorLabels" . | nindent 6 }}
      component: gitserver
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "emeland-demo.labels" . | nindent 8 }}
        component: gitserver
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "emeland-demo.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-ssh
          image: {{ include "emeland-demo.gitserverImage" . | quote }}
          command: ["sh", "-c", "cp /secret/authorized_keys /ssh/authorized_keys && chmod 600 /ssh/authorized_keys"]
          volumeMounts:
            - name: deploy-key
              mountPath: /secret
              readOnly: true
            - name: ssh-dir
              mountPath: /ssh
      containers:
        - name: gitserver
          image: {{ include "emeland-demo.gitserverImage" . | quote }}
          imagePullPolicy: {{ .Values.image.gitserver.pullPolicy }}
          ports:
            - name: ssh
              containerPort: 22
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ssh-dir
              mountPath: /home/git/.ssh
      volumes:
        - name: deploy-key
          secret:
            secretName: {{ include "emeland-demo.fullname" . }}-deploy-key
            defaultMode: 0600
        - name: ssh-dir
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emeland-demo.fullname" . }}-gitsensor
  labels:
    {{- include "emeland-demo.labels" . | nindent 4 }}
    component: gitsensor
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "emeland-demo.selectorLabels" . | nindent 6 }}
      component: gitsensor
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "emeland-demo.labels" . | nindent 8 }}
        component: gitsensor
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "emeland-demo.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gitsensor
          image: {{ include "emeland-demo.gitsensorImage" . | quote }}
          imagePullPolicy: {{ .Values.image.gitsensor.pullPolicy }}
          args:
            - -config
            - /config/sensor.yaml
            - -listen
            - "0.0.0.0:{{ .Values.gitsensor.listenPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.gitsensor.listenPort }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: gitsensor-config
              mountPath: /config
              readOnly: true
            - name: deploy-key
              mountPath: /keys
              readOnly: true
            - name: work
              mountPath: /work
      volumes:
        - name: gitsensor-config
          configMap:
            name: {{ include "emeland-demo.fullname" . }}-gitsensor-config
        - name: deploy-key
          secret:
            secretName: {{ include "emeland-demo.fullname" . }}-deploy-key
            defaultMode: 0444
        - name: work
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
